<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="/css/login/login.css" rel="stylesheet" type="text/css">
    <link href="/css/base.css" rel="stylesheet" type="text/css">
    <script src="/js/user/login.js" type="text/javascript"></script>
</head>
<body>
    <div class="overlay active" id="login-modal-overlay">
        <div class="modal" role="dialog" aria-modal="true">
            <h2>Вход</h2>
            <p class="subtitle">Для продолжения необходимо авторизоваться</p>
            <form class="login-form" id="login-form" th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Мобильный телефон</label>
                    <input type="tel"
                           id="username"
                           name="username"
                           pattern="^(\+7|8)\s\(\d{3}\)\s\d{3}-\d{2}-\d{2}$"
                           class="form-input"
                           placeholder="+7 (___) ___-__-__" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input type="password"
                           name="password"
                           id="password"
                           minlength="3"
                           maxlength="256"
                           class="form-input"
                           placeholder="Введите пароль" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Войти</button>
                </div>
            </form>

            <div class="form-footer">
                <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
</body>
</html>
