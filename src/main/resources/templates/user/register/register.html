<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="/css/login/login.css" rel="stylesheet" type="text/css">
    <link href="/css/base.css" rel="stylesheet" type="text/css">
    <script src="/js/user/login.js" type="text/javascript"></script>
</head>
<body>
    <div class="overlay active" id="login-modal-overlay">
        <div class="modal" role="dialog" aria-modal="true">
            <h2>Регистрация</h2>
            <p class="subtitle">Для регистрации заполните следующие поля</p>
            <div>
                <form class="login-form" th:action="@{/register}" method="post" th:object="${createDto}">
                    <div class="form-group">
                        <label class="form-label" for="name">
                            Введите имя
                        </label>
                        <input id="name" name="name" type="text"
                               minlength="2"
                               maxlength="25"
                               placeholder="Имя"
                               class="form-input"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="surname">
                            Введите фамилию
                        </label>
                        <input id="surname" name="surname" type="text"
                               minlength="2"
                               maxlength="25"
                               placeholder="Фамилия"
                               class="form-input"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="last_Name">
                            Введите отчество
                        </label>
                        <input id="last_Name" name="lastName" type="text"
                               maxlength="25"
                               placeholder="Отчество"
                               class="form-input"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="username">
                            Введите номер телефона
                        </label>
                        <input id="username" name="mobilePhone" type="tel"
                               placeholder="+7 (___) ___-__-__"
                               pattern="^(\+7|8)\s\(\d{3}\)\s\d{3}-\d{2}-\d{2}$"
                               class="form-input"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">
                            Введите пароль
                        </label>
                        <input id="password" name="password" type="password"
                               minlength="4"
                               maxlength="256"
                               placeholder="Введите пароль"
                               class="form-input"
                               required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Зарегистрироваться</button>
                    </div>
                    <div class="form-footer">
                        <span>Вы уже зарегистрированы? <a href="/login">Войти</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
